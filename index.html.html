<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive BMI Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 0% 0%, #0d0e15 0%, #050508 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #8b5cf6;
            --secondary: #3b82f6;
            --text: #f3f4f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-color: #050508;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .bmi-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #9ca3af;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 5px;
            outline: none;
        }

        .result-container {
            text-align: center;
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 16px;
        }

        .bmi-score {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .bmi-status {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .bmi-suggestion {
            font-size: 0.85rem;
            color: #9ca3af;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="bmi-card">
        <h1>BMI Calculator</h1>

        <div class="input-group">
            <div class="input-header">
                <span>Height</span>
                <span id="height-val">170 cm</span>
            </div>
            <input type="range" id="height" min="100" max="220" value="170" oninput="calculateBMI()">
        </div>

        <div class="input-group">
            <div class="input-header">
                <span>Weight</span>
                <span id="weight-val">70 kg</span>
            </div>
            <input type="range" id="weight" min="30" max="150" value="70" oninput="calculateBMI()">
        </div>

        <div class="result-container">
            <div class="bmi-score" id="bmi-score">24.2</div>
            <div class="bmi-status" id="bmi-status">Normal Weight</div>
            <p class="bmi-suggestion" id="bmi-suggestion">You have a healthy body weight. Maintain your lifestyle!</p>
        </div>
    </div>

    <script>
        function calculateBMI() {
            const height = document.getElementById('height').value;
            const weight = document.getElementById('weight').value;

            document.getElementById('height-val').innerText = height + " cm";
            document.getElementById('weight-val').innerText = weight + " kg";

            // Calculation
            const heightInMeters = height / 100;
            const bmi = (weight / (heightInMeters * heightInMeters)).toFixed(1);

            document.getElementById('bmi-score').innerText = bmi;

            let status = "";
            let color = "";
            let suggestion = "";

            if (bmi < 18.5) {
                status = "Underweight";
                color = "#3b82f6"; // Blue
                suggestion = "Focus on balanced nutrition and protein intake to reach a healthier weight.";
            } else if (bmi >= 18.5 && bmi <= 24.9) {
                status = "Normal Weight";
                color = "#10b981"; // Green
                suggestion = "Excellent! You have a healthy body weight. Maintain your active lifestyle.";
            } else if (bmi >= 25 && bmi <= 29.9) {
                status = "Overweight";
                color = "#f59e0b"; // Orange
                suggestion = "Consider incorporating more physical activities and portion control into your daily routine.";
            } else {
                status = "Obese";
                color = "#ef4444"; // Red
                suggestion = "We highly recommend consulting a health specialist for customized nutritional advice.";
            }

            const statusEl = document.getElementById('bmi-status');
            const scoreEl = document.getElementById('bmi-score');
            
            statusEl.innerText = status;
            statusEl.style.color = color;
            scoreEl.style.color = color;
            document.getElementById('bmi-suggestion').innerText = suggestion;
        }

        // Run once on load
        calculateBMI();
    </script>
</body>
</html>
